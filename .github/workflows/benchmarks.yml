name: Performance Benchmarks

on:
  pull_request:
    branches: [ main ]

permissions:
  pull-requests: write
  contents: write

jobs:
  benchmark:
    name: Vitest Benchmark
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Vitest Benchmarks
        run: pnpm exec vitest bench --run --outputJson=vitest-raw.json

      - name: Format Benchmark Results
        run: |
          node -e "
          const fs = require('fs');
          const raw = JSON.parse(fs.readFileSync('vitest-raw.json', 'utf8'));
          const formatted = [];
          
          if (raw.files) {
            raw.files.forEach(file => {
              if (file.groups) {
                file.groups.forEach(group => {
                  if (group.benchmarks) {
                    group.benchmarks.forEach(bench => {
                      formatted.push({
                        name: bench.name,
                        value: Math.round(bench.hz),
                        unit: 'hz'
                      });
                    });
                  }
                });
              }
            });
          }
          
          fs.writeFileSync('bench-results.json', JSON.stringify(formatted, null, 2));
          "

      - name: Compare and Comment PR
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Vitest Performance Run
          tool: 'customBiggerIsBetter'
          output-file-path: bench-results.json
          gh-pages-branch: 'gh-benchmarks'
          benchmark-data-dir-path: 'benchmarks'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          comment-on-alert: true
          summary-always: true
          alert-threshold: '200%'