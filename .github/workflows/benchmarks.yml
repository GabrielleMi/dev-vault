name: Performance Benchmarks

on:
  pull_request:
    branches: [ main ]

permissions:
  pull-requests: write
  contents: write

jobs:
  benchmark:
    name: Vitest Benchmark
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Vitest Benchmarks
        run: pnpm exec vitest bench --run --json=vitest-raw.json

      - name: Format Benchmark Results
        run: |
          node -e "
          const fs = require('fs');
          const raw = JSON.parse(fs.readFileSync('vitest-raw.json', 'utf8'));
          const formatted = [];
          
          // Le format `--json` de Vitest bench produit un tableau plat de fichiers
          if (Array.isArray(raw)) {
            raw.forEach(file => {
              if (file.files) {
                file.files.forEach(f => {
                  if (f.groups) {
                    f.groups.forEach(g => {
                      if (g.benchmarks) {
                        g.benchmarks.forEach(b => {
                          formatted.push({
                            name: b.name,
                            value: Math.round(b.hz),
                            unit: 'hz'
                          });
                        });
                      }
                    });
                  }
                });
              }
            });
          }
          
          fs.writeFileSync('bench-results.json', JSON.stringify(formatted, null, 2));
          "

      - name: Compare and Comment PR
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Vitest Performance Run
          tool: 'customBiggerIsBetter' # Changement appliqué ici
          output-file-path: bench-results.json
          gh-pages-branch: 'gh-benchmarks'
          benchmark-data-dir-path: 'benchmarks'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          comment-on-alert: true
          summary-always: true
          alert-threshold: '130%'