name: Check Docs Build

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -w build

      - name: Clean docs output
        run: pnpm run docs:clean

      - name: Build docs
        run: pnpm run docs:build

      - name: Verify docs
        run: |
          if [ ! -d "docs" ]; then
            echo "ERROR: docs/ not generated" >&2
            exit 1
          fi
          echo "Docs generated; listing top files:"
          ls -la docs | sed -n '1,200p'

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: docs
