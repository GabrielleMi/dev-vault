name: Test Suite

on:
  pull_request:
    branches: [main]
    paths:
      - 'packages/**'
      - 'pnpm-workspace.yaml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Run Tests
        run: pnpm test --filter "...[origin/main]"